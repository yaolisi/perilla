name: tenant-security-regression

on:
  workflow_dispatch:
    inputs:
      slow_threshold_seconds:
        description: "Override slow threshold in seconds (optional)"
        required: false
        type: string
  pull_request:
    paths-ignore:
      - "docs/**"
      - "tutorial*.md"
      - "*.md"
    paths:
      - "backend/core/workflows/**"
      - "backend/middleware/tenant_context.py"
      - "backend/middleware/tenant_key_binding.py"
      - "backend/config/settings.py"
      - "backend/scripts/test_tenant_security_regression.sh"
      - "backend/tests/test_workflow_tenant_api_isolation.py"
      - "backend/tests/test_workflow_tenant_guard.py"
      - "backend/tests/test_production_readiness_baseline.py"
      - ".github/workflows/tenant-security-regression.yml"
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "docs/**"
      - "tutorial*.md"
      - "*.md"
    paths:
      - "backend/core/workflows/**"
      - "backend/middleware/tenant_context.py"
      - "backend/middleware/tenant_key_binding.py"
      - "backend/config/settings.py"
      - "backend/scripts/test_tenant_security_regression.sh"
      - "backend/tests/test_workflow_tenant_api_isolation.py"
      - "backend/tests/test_workflow_tenant_guard.py"
      - "backend/tests/test_production_readiness_baseline.py"
      - ".github/workflows/tenant-security-regression.yml"

concurrency:
  group: tenant-security-regression-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tenant-security-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve slow threshold
        env:
          WORKFLOW_INPUT_SLOW_THRESHOLD: ${{ github.event.inputs.slow_threshold_seconds }}
        run: |
          threshold="${WORKFLOW_INPUT_SLOW_THRESHOLD:-}"
          if [[ -n "$threshold" ]]; then
            if ! [[ "$threshold" =~ ^[1-9][0-9]*$ ]]; then
              {
                echo "## Invalid workflow input"
                echo "- input: \`slow_threshold_seconds=${threshold}\`"
                echo "- reason: must be a positive integer"
                echo "- examples: \`10\`, \`20\`, \`30\`"
              } >> "$GITHUB_STEP_SUMMARY"
              echo "Invalid slow_threshold_seconds: '$threshold'. It must be a positive integer." >&2
              exit 1
            fi
            echo "TENANT_SECURITY_SLOW_THRESHOLD_SECONDS=$threshold" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "TENANT_SECURITY_SLOW_THRESHOLD_SECONDS=20" >> "$GITHUB_ENV"
          else
            echo "TENANT_SECURITY_SLOW_THRESHOLD_SECONDS=30" >> "$GITHUB_ENV"
          fi

      - name: Run tenant security regression suite
        env:
          JUNIT_XML_PATH: test-reports/tenant-security-regression.xml
          TENANT_SECURITY_SUMMARY_PATH: test-reports/tenant-security-summary.md
        run: |
          mkdir -p test-reports
          chmod +x scripts/test_tenant_security_regression.sh
          ./scripts/test_tenant_security_regression.sh

      - name: Publish tenant summary to job summary
        if: always()
        run: |
          if [[ -f test-reports/tenant-security-summary.md ]]; then
            cat test-reports/tenant-security-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Tenant Security Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "No summary file found at test-reports/tenant-security-summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload tenant security junit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tenant-security-junit-report-${{ github.run_number }}
          path: backend/test-reports/tenant-security-regression.xml
          if-no-files-found: warn

      - name: Upload tenant security summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tenant-security-summary-${{ github.run_number }}
          path: backend/test-reports/tenant-security-summary.md
          if-no-files-found: warn
