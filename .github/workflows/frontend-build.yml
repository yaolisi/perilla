# Vitest + TypeScript/Vite 生产构建 + **i18n 硬编码基线** + **`npm audit --audit-level=critical`**。本地：`make test-frontend-unit`、`make build-frontend`；前后端合并等价：`bash scripts/release-preflight.sh` / **`make release-preflight`**。**`make pr-check`** 另含 **`roadmap-acceptance-unit`**；**`make pr-check-fast`** 跳过 Production build； roadmap 可用 **`SKIP_ROADMAP_ACCEPTANCE_IN_PR_CHECK=1`** 跳过。
# Node：`setup-node` 读仓库根 `.nvmrc`；`scripts/check-nvmrc-align.sh` 保证其与 **`frontend/.nvmrc`** 字节一致。
name: frontend-build

permissions:
  contents: read
  actions: write # setup-node npm cache

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "frontend/**"
      - "frontend/.nvmrc"
      - ".nvmrc"
      - "scripts/pr-check.sh"
      - "scripts/pr-check-fast.sh"
      - "scripts/check-nvmrc-align.sh"
      - "scripts/release-preflight.sh"
      - "scripts/production-preflight.sh"
      # Local `make pr-check*` / make test-frontend-unit / build-frontend parity.
      - "Makefile"
      # Repo root only; npm scripts orchestrate frontend (e.g. test-frontend-unit / build-frontend).
      - "package.json"
      - ".github/workflows/frontend-build.yml"
      - "scripts/check-frontend-i18n-hardcoded.sh"
      - "scripts/i18n-hardcoded-baseline.txt"
  push:
    branches:
      - main
      - master
    paths:
      - "frontend/**"
      - "frontend/.nvmrc"
      - ".nvmrc"
      - "scripts/pr-check.sh"
      - "scripts/pr-check-fast.sh"
      - "scripts/check-nvmrc-align.sh"
      - "scripts/release-preflight.sh"
      - "scripts/production-preflight.sh"
      # Local `make pr-check*` / make test-frontend-unit / build-frontend parity.
      - "Makefile"
      # Repo root only; npm scripts orchestrate frontend (e.g. test-frontend-unit / build-frontend).
      - "package.json"
      - ".github/workflows/frontend-build.yml"
      - "scripts/check-frontend-i18n-hardcoded.sh"
      - "scripts/i18n-hardcoded-baseline.txt"

concurrency:
  group: frontend-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Assert .nvmrc matches frontend/.nvmrc
        working-directory: ${{ github.workspace }}
        run: bash scripts/check-nvmrc-align.sh

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: i18n hardcoded strings guard (baseline)
        working-directory: ${{ github.workspace }}
        run: bash scripts/check-frontend-i18n-hardcoded.sh

      - name: npm audit (critical threshold)
        run: npm audit --audit-level=critical

      - name: Unit tests (Vitest)
        run: npm run test:unit

      - name: Production build
        run: npm run build
