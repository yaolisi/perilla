name: dependency-security-scan

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/requirements/**"
      - "scripts/scan-dependencies.sh"
      - "scripts/check-dependency-version-policy.sh"
      - ".github/workflows/dependency-security-scan.yml"
      - ".github/dependabot.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "backend/requirements/**"
      - "scripts/scan-dependencies.sh"
      - "scripts/check-dependency-version-policy.sh"
      - ".github/workflows/dependency-security-scan.yml"
      - ".github/dependabot.yml"
  schedule:
    # 每月 1 号 UTC 03:00
    - cron: "0 3 1 * *"

concurrency:
  group: dependency-security-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Enforce dependency version policy
        run: |
          chmod +x scripts/check-dependency-version-policy.sh
          ./scripts/check-dependency-version-policy.sh

      - name: Run dependency vulnerability scan
        run: |
          chmod +x scripts/scan-dependencies.sh
          ./scripts/scan-dependencies.sh
