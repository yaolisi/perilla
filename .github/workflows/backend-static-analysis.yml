# 单 job：`check-nvmrc-align` → **`scripts/lint-backend.sh`** → `scripts/test-no-fallback.sh`（no_fallback 用例 + **`test_production_readiness_baseline`**) → **`make test-tenant-isolation`** → **`scripts/helm-chart-check.sh`** → **`scripts/merge-gate-contract-tests.sh`** → **`scripts/compose-config-check.sh`**（`docker-compose.yml` + **`docker-compose.prod.yml`** + **`deploy/monitoring/docker-compose.monitoring.yml`** 叠加）→ **`scripts/monitoring-config-check.sh`**（Prometheus / Alertmanager）→ **`scripts/k8s-manifest-check.sh`**（`deploy/k8s` kubeconform）。本地等价一键：**`bash scripts/production-preflight.sh`** / **`make production-preflight`**；全栈含前端见 **`bash scripts/release-preflight.sh`**。其后 **`make pr-check`** / **`pr-check-fast`** 另有 Vitest、**`roadmap-acceptance-unit`**（可 **`SKIP_ROADMAP_ACCEPTANCE_IN_PR_CHECK=1`**）、**`build-frontend`**（仅 `pr-check`；见 `frontend-build`）。
name: backend-static-analysis

on:
  pull_request:
    paths:
      - "backend/**"
      - "scripts/test-no-fallback.sh"
      - "scripts/pr-check.sh"
      - "scripts/pr-check-fast.sh"
      - "scripts/check-nvmrc-align.sh"
      - "scripts/lint-backend.sh"
      - "scripts/quick-check.sh"
      - "scripts/production-preflight.sh"
      - "scripts/release-preflight.sh"
      - "scripts/doctor.sh"
      - "scripts/npm-scripts.sh"
      # Local `make pr-check*` / CI script parity (scripts/pr-check*.sh → make).
      - "Makefile"
      # Exact path at repo root only (not frontend/package.json).
      - "package.json"
      - ".nvmrc"
      - "frontend/.nvmrc"
      - "pytest.ini"
      - "backend/pytest.ini"
      - ".github/workflows/backend-static-analysis.yml"
      - "deploy/helm/**"
      - "deploy/k8s/**"
      - "deploy/monitoring/**"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - "scripts/compose-config-check.sh"
      - "scripts/monitoring-config-check.sh"
      - "scripts/k8s-manifest-check.sh"
      - "docker/**"
      - "scripts/healthcheck.sh"
      - "scripts/helm-chart-check.sh"
      - "scripts/merge-gate-contract-tests.sh"
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - "scripts/test-no-fallback.sh"
      - "scripts/pr-check.sh"
      - "scripts/pr-check-fast.sh"
      - "scripts/check-nvmrc-align.sh"
      - "scripts/lint-backend.sh"
      - "scripts/quick-check.sh"
      - "scripts/production-preflight.sh"
      - "scripts/release-preflight.sh"
      - "scripts/doctor.sh"
      - "scripts/npm-scripts.sh"
      # Local `make pr-check*` / CI script parity (scripts/pr-check*.sh → make).
      - "Makefile"
      # Exact path at repo root only (not frontend/package.json).
      - "package.json"
      - ".nvmrc"
      - "frontend/.nvmrc"
      - "pytest.ini"
      - "backend/pytest.ini"
      - ".github/workflows/backend-static-analysis.yml"
      - "deploy/helm/**"
      - "deploy/k8s/**"
      - "deploy/monitoring/**"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - "scripts/compose-config-check.sh"
      - "scripts/monitoring-config-check.sh"
      - "scripts/k8s-manifest-check.sh"
      - "docker/**"
      - "scripts/healthcheck.sh"
      - "scripts/helm-chart-check.sh"
      - "scripts/merge-gate-contract-tests.sh"

concurrency:
  group: backend-static-analysis-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Align .nvmrc (repo root vs frontend/)
        working-directory: ${{ github.workspace }}
        run: bash scripts/check-nvmrc-align.sh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements/base.txt

      - name: Install dependencies
        run: pip install -r requirements/base.txt ruff mypy

      - name: Ruff + Mypy (lint-backend)
        working-directory: ${{ github.workspace }}
        run: bash scripts/lint-backend.sh

      # 脚本路径为仓库根目录 `scripts/`；默认 working-directory 为 backend，此处显式回到根目录
      - name: Run test-no-fallback suite
        working-directory: ${{ github.workspace }}
        run: bash scripts/test-no-fallback.sh -q

      - name: Tenant isolation suite
        working-directory: ${{ github.workspace }}
        run: make test-tenant-isolation

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Helm chart (lint + template)
        working-directory: ${{ github.workspace }}
        run: bash scripts/helm-chart-check.sh

      # Helm env 映射 + Makefile pr-check 依赖 + package.json scripts（列表：scripts/merge-gate-contract-tests.sh）
      - name: Helm & merge gate contract tests
        working-directory: ${{ github.workspace }}
        run: bash scripts/merge-gate-contract-tests.sh -q

      - name: Docker Compose merge (base + prod + monitoring overlays)
        working-directory: ${{ github.workspace }}
        run: bash scripts/compose-config-check.sh

      - name: Prometheus / Alertmanager config (promtool / amtool)
        working-directory: ${{ github.workspace }}
        run: bash scripts/monitoring-config-check.sh

      - name: K8s example manifests (kubeconform)
        working-directory: ${{ github.workspace }}
        run: bash scripts/k8s-manifest-check.sh
