# 单 job：`check-nvmrc-align` → **`scripts/lint-backend.sh`**（ruff E9 + 目标 mypy）→ `scripts/test-no-fallback.sh`（同一 pip）。对应 `make pr-check` 中前段：仅 **lint-backend + test-no-fallback**；完整 **`make pr-check`** / **`make pr-check-fast`** 另含 Vitest、默认同源的 **`roadmap-acceptance-unit`**（可用 **`SKIP_ROADMAP_ACCEPTANCE_IN_PR_CHECK=1`** 跳过）、以及 **`build-frontend`**（仅 `pr-check`；见 `frontend-build`）。
name: backend-static-analysis

on:
  pull_request:
    paths:
      - "backend/**"
      - "scripts/test-no-fallback.sh"
      - "scripts/pr-check.sh"
      - "scripts/pr-check-fast.sh"
      - "scripts/check-nvmrc-align.sh"
      - "scripts/lint-backend.sh"
      - "scripts/quick-check.sh"
      - "scripts/npm-scripts.sh"
      # Local `make pr-check*` / CI script parity (scripts/pr-check*.sh → make).
      - "Makefile"
      # Exact path at repo root only (not frontend/package.json).
      - "package.json"
      - ".nvmrc"
      - "frontend/.nvmrc"
      - "pytest.ini"
      - "backend/pytest.ini"
      - ".github/workflows/backend-static-analysis.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - "scripts/test-no-fallback.sh"
      - "scripts/pr-check.sh"
      - "scripts/pr-check-fast.sh"
      - "scripts/check-nvmrc-align.sh"
      - "scripts/lint-backend.sh"
      - "scripts/quick-check.sh"
      - "scripts/npm-scripts.sh"
      # Local `make pr-check*` / CI script parity (scripts/pr-check*.sh → make).
      - "Makefile"
      # Exact path at repo root only (not frontend/package.json).
      - "package.json"
      - ".nvmrc"
      - "frontend/.nvmrc"
      - "pytest.ini"
      - "backend/pytest.ini"
      - ".github/workflows/backend-static-analysis.yml"

concurrency:
  group: backend-static-analysis-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Align .nvmrc (repo root vs frontend/)
        working-directory: ${{ github.workspace }}
        run: bash scripts/check-nvmrc-align.sh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements/base.txt

      - name: Install dependencies
        run: pip install -r requirements/base.txt ruff mypy

      - name: Ruff + Mypy (lint-backend)
        working-directory: ${{ github.workspace }}
        run: bash scripts/lint-backend.sh

      # 脚本路径为仓库根目录 `scripts/`；默认 working-directory 为 backend，此处显式回到根目录
      - name: Run test-no-fallback suite
        working-directory: ${{ github.workspace }}
        run: bash scripts/test-no-fallback.sh -q
