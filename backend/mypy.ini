[mypy]
python_version = 3.11
mypy_path = backend
explicit_package_bases = True
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
no_implicit_optional = True
check_untyped_defs = True
show_error_codes = True
pretty = True
exclude = (?x)(^tests/|^scripts/|^(backend/)?core/runtimes/torch/torch_asr_runtime\.py$)

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-core.data.models.idempotency]
ignore_missing_imports = True

[mypy-api.agents]
ignore_missing_imports = True
disable_error_code = import-untyped

[mypy-core.*]
ignore_missing_imports = True

[mypy-config.*]
ignore_missing_imports = True

[mypy-log]
ignore_missing_imports = True

# Temporary workaround: mypy internal crash on this module
[mypy-core.runtimes.torch.torch_asr_runtime]
ignore_errors = True
