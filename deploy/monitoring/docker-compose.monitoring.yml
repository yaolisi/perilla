services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: openvitamin-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./deploy/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_healthy
      alertmanager:
        condition: service_started
    networks:
      - openvitamin-net

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: openvitamin-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    environment:
      SMTP_SMARTHOST: "${SMTP_SMARTHOST:-smtp.example.com:587}"
      SMTP_FROM: "${SMTP_FROM:-openvitamin-alerts@example.com}"
      SMTP_AUTH_USERNAME: "${SMTP_AUTH_USERNAME:-}"
      SMTP_AUTH_PASSWORD: "${SMTP_AUTH_PASSWORD:-}"
      ALERT_EMAIL_TO: "${ALERT_EMAIL_TO:-ops@example.com}"
      ALERT_CRITICAL_EMAIL_TO: "${ALERT_CRITICAL_EMAIL_TO:-ops-critical@example.com}"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/REPLACE/ME}"
      SLACK_ALERT_CHANNEL: "${SLACK_ALERT_CHANNEL:-#openvitamin-alerts}"
    volumes:
      - ./deploy/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - openvitamin-net

  grafana:
    image: grafana/grafana:11.1.4
    container_name: openvitamin-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - openvitamin-net

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data:
