apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "perilla-backend.fullname" . }}
  labels:
    {{- include "perilla-backend.labels" . | nindent 4 }}
  {{- with .Values.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: perilla-backend
  template:
    metadata:
      labels:
        {{- include "perilla-backend.labels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - perilla-backend
                topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- if .Values.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: perilla-backend
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if or .Values.serviceAccount.create .Values.serviceAccount.name }}
      serviceAccountName: {{ include "perilla-backend.serviceAccountName" . }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName | quote }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
          {{- if .Values.secretEnvFrom.enabled }}
          envFrom:
            - secretRef:
                name: {{ .Values.secretEnvFrom.name }}
                optional: {{ .Values.secretEnvFrom.optional }}
          {{- end }}
          env:
            - name: DEBUG
              value: {{ .Values.env.debug | quote }}
            - name: HOST
              value: {{ .Values.env.host | quote }}
            - name: PORT
              value: {{ .Values.env.port | quote }}
            {{- if .Values.env.logFormat }}
            - name: LOG_FORMAT
              value: {{ .Values.env.logFormat | quote }}
            {{- end }}
            {{- if .Values.env.logLevel }}
            - name: LOG_LEVEL
              value: {{ .Values.env.logLevel | quote }}
            {{- end }}
            {{- if .Values.env.defaultModel }}
            - name: DEFAULT_MODEL
              value: {{ .Values.env.defaultModel | quote }}
            {{- end }}
            {{- if .Values.env.apiPrefix }}
            - name: API_PREFIX
              value: {{ .Values.env.apiPrefix | quote }}
            {{- end }}
            {{- if .Values.env.trustedHosts }}
            - name: TRUSTED_HOSTS
              value: {{ .Values.env.trustedHosts | quote }}
            {{- end }}
            {{- if .Values.env.trustedHostExemptOpsPaths }}
            - name: TRUSTED_HOST_EXEMPT_OPS_PATHS
              value: {{ .Values.env.trustedHostExemptOpsPaths | quote }}
            {{- end }}
            {{- if .Values.env.forwardedAllowIps }}
            - name: FORWARDED_ALLOW_IPS
              value: {{ .Values.env.forwardedAllowIps | quote }}
            {{- end }}
            {{- if .Values.env.uvicornLimitConcurrency }}
            - name: UVICORN_LIMIT_CONCURRENCY
              value: {{ .Values.env.uvicornLimitConcurrency | quote }}
            {{- end }}
            {{- if .Values.env.uvicornLimitMaxRequests }}
            - name: UVICORN_LIMIT_MAX_REQUESTS
              value: {{ .Values.env.uvicornLimitMaxRequests | quote }}
            {{- end }}
