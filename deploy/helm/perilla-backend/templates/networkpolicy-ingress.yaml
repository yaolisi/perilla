{{- if .Values.networkPolicy.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "perilla-backend.fullname" . }}-netpol-ingress
  labels:
    {{- include "perilla-backend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: perilla-backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.ingress.port }}
    - from:
        - namespaceSelector:
            matchLabels:
              "kubernetes.io/metadata.name": {{ .Values.networkPolicy.ingress.monitoringNamespace | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.ingress.port }}
{{- end }}
