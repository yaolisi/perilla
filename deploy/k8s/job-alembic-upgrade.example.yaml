# 发布前或 CI：对 PostgreSQL 执行 schema 迁移（与 backend 镜像同版本）。
# 与 Deployment 使用相同 DATABASE_URL；升级前跑 Job，成功后再滚动 backend。
# 例：kubectl apply -f job-alembic-upgrade.example.yaml && kubectl wait --for=condition=complete job/perilla-alembic-upgrade --timeout=300s
apiVersion: batch/v1
kind: Job
metadata:
  name: perilla-alembic-upgrade
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: alembic
          image: perilla-backend:latest
          imagePullPolicy: IfNotPresent
          workingDir: /app/backend
          command: ["alembic", "-c", "alembic.ini", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: perilla-backend-env
                optional: false
