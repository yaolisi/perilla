[pytest]
testpaths = backend/tests
pythonpath = backend
asyncio_mode = auto
markers =
    no_fallback: API error paths that must not hit HTTPException fallback handler.
    asyncio: async test (pytest-asyncio; also see asyncio_mode).
    requires_monorepo: needs full repo root (Makefile, scripts/, etc.); skipped on backend-only bundle.
    tenant_isolation: multi-tenant / MCP / tenant middleware regression; `make test-tenant-isolation` runs `pytest -m tenant_isolation`.

